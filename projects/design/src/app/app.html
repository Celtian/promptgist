<header
  class="sticky top-0 z-20 border-b border-[var(--ui-color-border)] bg-[color-mix(in_srgb,var(--ui-color-surface)_92%,transparent)]"
>
  <a
    class="fixed left-4 top-3 z-40 -translate-y-40 bg-[var(--ui-color-primary)] px-3 py-2 font-bold text-[var(--ui-color-primary-contrast)] focus:translate-y-0"
    href="#main-content"
  >
    Skip to content
  </a>
  <div
    class="mx-auto flex min-h-16 w-full max-w-7xl items-center justify-between gap-4 px-8 max-md:flex-col max-md:items-stretch max-md:gap-3 max-md:px-4 max-md:py-3"
  >
    <a
      ui-button
      variant="ghost"
      class="inline-flex min-w-0 items-center gap-3 text-inherit no-underline"
      aria-label="Promptgist Design home"
      [routerLink]="[ROUTE_DEFINITION.APP.HOME]"
    >
      <span
        aria-hidden="true"
        class="inline-flex size-8 items-center justify-center bg-[var(--ui-color-primary)] font-black text-[var(--ui-color-primary-contrast)]"
      >
        P
      </span>
      <span class="truncate font-extrabold">Promptgist Design</span>
    </a>

    <div class="flex items-center gap-3 max-md:justify-center">
      <ui-ltr-switcher />
      <ui-theme-switcher />
    </div>
  </div>
</header>

<main id="main-content" class="flex-1 focus:outline-none" tabindex="-1">
  <div class="mx-auto w-full max-w-7xl">
    <router-outlet />
  </div>
</main>

<footer class="border-t border-[var(--ui-color-border)] text-[var(--ui-color-text-muted)]">
  <div
    class="mx-auto flex min-h-14 w-full max-w-7xl items-center justify-between gap-4 px-8 max-md:flex-col max-md:items-start max-md:px-4 max-md:py-3"
  >
    <p>Shared UI foundations and Angular components.</p>
    <a
      class="font-bold text-[var(--ui-color-primary)] no-underline hover:underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[color-mix(in_srgb,var(--ui-color-primary)_60%,transparent)]"
      [routerLink]="[ROUTE_DEFINITION.APP.HOME]"
    >
      Home
    </a>
  </div>
</footer>
