<header
  class="sticky top-0 z-20 border-b border-(--ui-color-border) bg-(--ui-color-surface)/92 backdrop-blur-md"
>
  <a
    class="fixed left-4 top-3 z-40 -translate-y-40 bg-primary px-3 py-2 font-bold text-primary-contrast focus:translate-y-0"
    href="#main-content"
  >
    Skip to content
  </a>
  <div
    class="mx-auto flex min-h-16 w-full max-w-7xl items-center justify-between gap-4 px-8 max-md:flex-col max-md:items-stretch max-md:gap-3 max-md:px-4 max-md:py-3"
  >
    <a
      ui-button
      variant="ghost"
      class="inline-flex min-w-0 items-center gap-3 text-inherit no-underline"
      aria-label="Promptgist Design home"
      [routerLink]="[ROUTE_DEFINITION.APP.HOME]"
    >
      <span
        aria-hidden="true"
        class="inline-flex size-8 items-center justify-center bg-primary font-black text-primary-contrast"
      >
        P
      </span>
      <span class="truncate font-extrabold">Promptgist Design</span>
    </a>

    <div class="flex items-center gap-3 max-md:justify-center">
      <ui-ltr-switcher />
      <ui-theme-switcher />
    </div>
  </div>
</header>

<main id="main-content" class="flex-1 focus:outline-none" tabindex="-1">
  <div class="mx-auto w-full max-w-7xl">
    <router-outlet />
  </div>
</main>

<footer class="w-full border-t border-(--ui-color-border) bg-(--ui-color-surface-muted)">
  <div
    class="mx-auto max-w-7xl px-8 py-8 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4"
  >
    <!-- Brand / Credits -->
    <div class="flex items-center gap-2 text-sm text-(--ui-color-text-muted)">
      <span>© 2026 Promptgist Inc. All rights reserved.</span>
    </div>

    <!-- Footer Nav -->
    <div
      class="flex flex-wrap items-center justify-center gap-6 text-sm text-(--ui-color-text-muted)"
    >
      <a href="#" class="hover:text-(--ui-color-text) transition-colors">Privacy Policy</a>
      <a href="#" class="hover:text-(--ui-color-text) transition-colors">Terms of Service</a>
      <a href="#" class="hover:text-(--ui-color-text) transition-colors">Support</a>
      <a href="/" class="font-semibold text-primary hover:text-(--ui-color-text) transition-colors">
        Console Portal
      </a>
    </div>
  </div>
</footer>

<button
  ui-button
  type="button"
  appearance="filled"
  aria-label="Scroll to top"
  class="fixed bottom-8 right-8 size-12 rounded-full shadow-2xl z-50 p-0!"
  ngxScrollTop
>
  <svg
    aria-hidden="true"
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="2.5"
    stroke="currentColor"
    class="h-5 w-5"
  >
    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75 12 8.25l7.5 7.5" />
  </svg>
</button>
