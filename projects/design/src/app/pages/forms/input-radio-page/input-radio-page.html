<section
  class="grid w-full max-w-4xl justify-self-center gap-8 bg-[var(--ui-color-surface)] p-8 text-[var(--ui-color-text)] max-md:p-4"
>
  <header class="grid gap-3">
    <p class="m-0 text-xs font-bold uppercase text-[var(--ui-color-accent)]">Forms</p>
    <h1 class="m-0 text-4xl font-extrabold leading-none md:text-5xl">Radio Group</h1>
    <p class="m-0 max-w-2xl leading-7 text-[var(--ui-color-text-muted)]">
      A single-selection control based on the accessible listbox pattern.
    </p>
  </header>

  <section class="grid gap-4">
    <h2 class="m-0 text-xl font-bold">Interactive Demo</h2>
    <ui-card variant="outline" padding="lg" uiClass="grid gap-6">
      <div class="grid max-w-sm gap-4">
        <span class="text-sm font-semibold">Select an option</span>
        <ui-input-radio
          ariaLabel="Example radio group"
          [options]="options"
          [(value)]="radioValue"
        />
      </div>

      <div class="rounded-md bg-[var(--ui-color-surface-muted)] p-4 font-mono text-sm">
        <p class="m-0">Value: {{ radioValue() !== null ? radioValue() : 'null' }}</p>
      </div>
    </ui-card>
  </section>

  <section class="grid gap-4">
    <h2 class="m-0 text-xl font-bold">Layouts</h2>
    <ui-card variant="outline" padding="lg" uiClass="flex flex-col gap-6 sm:flex-row sm:gap-12">
      <div class="grid w-full max-w-sm gap-4">
        <h3 class="m-0 text-sm font-semibold text-[var(--ui-color-text-muted)]">Vertical</h3>
        <ui-input-radio [options]="options" [value]="'option-1'" />
      </div>
      <div class="grid w-full max-w-sm gap-4">
        <h3 class="m-0 text-sm font-semibold text-[var(--ui-color-text-muted)]">
          Horizontal (Inline)
        </h3>
        <ui-input-radio inline [options]="options" [(value)]="radioInlineValue" />
      </div>
    </ui-card>
  </section>

  <section class="grid gap-4">
    <h2 class="m-0 text-xl font-bold">States</h2>
    <ui-card variant="outline" padding="lg" uiClass="flex flex-col gap-6 sm:flex-row sm:gap-12">
      <div class="grid w-full max-w-sm gap-4">
        <h3 class="m-0 text-sm font-semibold text-[var(--ui-color-text-muted)]">Disabled Item</h3>
        <ui-input-radio [options]="optionsWithDisabled" [value]="'option-1'" />
      </div>
      <div class="grid w-full max-w-sm gap-4">
        <h3 class="m-0 text-sm font-semibold text-[var(--ui-color-text-muted)]">Disabled Group</h3>
        <ui-input-radio disabled [options]="options" [value]="'option-2'" />
      </div>
    </ui-card>
  </section>
</section>
