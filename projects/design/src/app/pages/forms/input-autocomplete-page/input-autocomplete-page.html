<section
  class="grid w-full max-w-4xl justify-self-center gap-8 bg-[var(--ui-color-surface)] p-8 text-[var(--ui-color-text)] max-md:p-4"
>
  <header class="grid gap-3">
    <p class="m-0 text-xs font-bold uppercase text-[var(--ui-color-accent)]">Forms</p>
    <h1 class="m-0 text-4xl font-extrabold leading-none md:text-5xl">Autocomplete</h1>
    <p class="m-0 max-w-2xl leading-7 text-[var(--ui-color-text-muted)]">
      A dropdown control allowing users to search and select an option from a list, or type a custom
      value.
    </p>
  </header>

  <section class="grid gap-4">
    <h2 class="m-0 text-xl font-bold">Interactive Demo</h2>
    <ui-card variant="outline" padding="lg" uiClass="grid gap-6">
      <div class="grid max-w-sm gap-2">
        <label for="demo-input-autocomplete" class="text-sm font-semibold">Select a country</label>
        <ui-input-autocomplete
          id="demo-input-autocomplete"
          fullWidth
          placeholder="Search for a country..."
          [options]="options"
          [(value)]="autocompleteValue"
        />
      </div>

      <div class="rounded-md bg-[var(--ui-color-surface-muted)] p-4 font-mono text-sm">
        <p class="m-0">Value: {{ autocompleteValue() }}</p>
      </div>
    </ui-card>
  </section>

  <section class="grid gap-4">
    <h2 class="m-0 text-xl font-bold">States</h2>
    <ui-card variant="outline" padding="lg" uiClass="flex flex-col gap-6 sm:flex-row sm:gap-12">
      <div class="grid w-full max-w-sm gap-2">
        <label for="disabled-item-demo" class="text-sm font-semibold">Disabled Item</label>
        <ui-input-autocomplete
          id="disabled-item-demo"
          fullWidth
          value="option-1"
          [options]="optionsWithDisabled"
        />
      </div>
      <div class="grid w-full max-w-sm gap-2">
        <label for="disabled-group-demo" class="text-sm font-semibold">Disabled Group</label>
        <ui-input-autocomplete
          id="disabled-group-demo"
          disabled
          fullWidth
          value="option-3"
          [options]="optionsWithDisabled"
        />
      </div>
    </ui-card>
  </section>
</section>
