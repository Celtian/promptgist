<header
  class="sticky top-0 z-50 w-full border-b border-(--ui-color-border) bg-(--ui-color-surface)/80 backdrop-blur-md"
>
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    <!-- Brand / Logo -->
    <div class="flex items-center gap-3">
      <div
        class="flex h-9 w-9 items-center justify-center rounded-xl bg-linear-to-br from-primary-400 to-primary-600 text-primary-contrast shadow-md shadow-primary-500/20"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="h-5 w-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"
          />
        </svg>
      </div>
      <span class="text-xl font-extrabold tracking-tight text-(--ui-color-text)">
        Promptgist<span
          class="text-transparent bg-clip-text bg-linear-to-r from-primary-400 to-emerald-500"
          >Portal</span
        >
      </span>
    </div>

    <!-- Navigation links -->
    <nav class="hidden md:flex items-center gap-6">
      <a
        href="#"
        class="text-sm font-semibold text-(--ui-color-text) hover:text-primary transition-colors"
        >Dashboard</a
      >
      <a
        href="#"
        class="text-sm font-semibold text-(--ui-color-text-muted) hover:text-(--ui-color-text) transition-colors"
        >Analytics</a
      >
      <a
        href="#"
        class="text-sm font-semibold text-(--ui-color-text-muted) hover:text-(--ui-color-text) transition-colors"
        >Projects</a
      >
      <a
        href="#"
        class="text-sm font-semibold text-(--ui-color-text-muted) hover:text-(--ui-color-text) transition-colors"
        >Settings</a
      >
    </nav>

    <!-- Right-aligned controls -->
    <div class="flex items-center gap-4">
      <!-- Theme Switcher component -->
      <ui-theme-switcher />

      <!-- Authentication Portal Actions -->
      @if (auth.isAuthenticated()) {
        <div class="relative">
          <!-- Profile Trigger Icon Button -->
          <button
            type="button"
            class="flex items-center rounded-full p-0.5 border border-transparent hover:border-(--ui-color-border) focus:outline-none transition-all cursor-pointer"
            tooltipPlacement="bottom"
            aria-haspopup="true"
            [aria-expanded]="isMenuOpen()"
            [uiTooltip]="auth.user()?.email || 'User profile menu'"
            (click)="isMenuOpen.set(!isMenuOpen())"
          >
            <ui-avatar variant="gradient" size="sm" [name]="auth.user()?.email || ''" />
          </button>

          <!-- Dropdown Overlay Card -->
          @if (isMenuOpen()) {
            <div
              class="absolute right-0 mt-2 w-64 origin-top-right rounded-xl border border-(--ui-color-border) bg-(--ui-color-surface) p-2 shadow-xl z-50 animate-in fade-in slide-in-from-top-2 duration-150"
            >
              <!-- Profile Brief Header -->
              <div
                class="flex items-center gap-3 px-3 py-2.5 border-b border-(--ui-color-border) mb-1.5"
              >
                <ui-avatar variant="gradient" size="sm" [name]="auth.user()?.email || ''" />
                <div class="flex flex-col min-w-0">
                  <span
                    class="text-[10px] font-bold text-(--ui-color-text-muted) tracking-wider uppercase"
                    >Active Account</span
                  >
                  <span class="text-sm font-bold text-(--ui-color-text) truncate">{{
                    auth.user()?.email
                  }}</span>
                </div>
              </div>

              <!-- Menu Link Choices -->
              <div class="space-y-1">
                <a
                  class="flex items-center gap-2.5 w-full px-3 py-2 text-sm rounded-lg text-(--ui-color-text-muted) hover:text-(--ui-color-text) hover:bg-(--ui-color-surface-muted) transition-colors cursor-pointer"
                  [routerLink]="['/' + ROUTE_DEFINITION.APP.PROMPT]"
                  (click)="isMenuOpen.set(false)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                    class="h-4.5 w-4.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5A3.375 3.375 0 0 0 10.125 2.25H5.625A1.125 1.125 0 0 0 4.5 3.375v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V14.25z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8.25 15h7.5M8.25 18h4.5"
                    />
                  </svg>
                  <span class="font-medium">Prompts</span>
                </a>

                <a
                  class="flex items-center gap-2.5 w-full px-3 py-2 text-sm rounded-lg text-(--ui-color-text-muted) hover:text-(--ui-color-text) hover:bg-(--ui-color-surface-muted) transition-colors cursor-pointer"
                  [routerLink]="['/' + ROUTE_DEFINITION.APP.ACCOUNT]"
                  (click)="isMenuOpen.set(false)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                    class="h-4.5 w-4.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                  </svg>
                  <span class="font-medium">Account Settings</span>
                </a>

                <button
                  type="button"
                  class="flex items-center gap-2.5 w-full text-left px-3 py-2 text-sm rounded-lg text-rose-500 hover:bg-rose-500/10 transition-colors cursor-pointer"
                  (click)="auth.signOut(); isMenuOpen.set(false)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                    class="h-4.5 w-4.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"
                    />
                  </svg>
                  <span class="font-medium">Sign Out</span>
                </button>
              </div>
            </div>
          }
        </div>
      } @else {
        <a
          ui-button
          variant="secondary"
          size="sm"
          class="inline-flex items-center gap-2 px-3 py-1.5"
          tooltipPlacement="bottom"
          [routerLink]="['/' + ROUTE_DEFINITION.APP.LOGIN]"
          [uiTooltip]="'Sign in to your console account'"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2.5"
            stroke="currentColor"
            class="h-4 w-4 text-(--ui-color-text-muted)"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75"
            />
          </svg>
          <span class="font-semibold text-xs text-(--ui-color-text)">Sign In</span>
        </a>
      }
    </div>
  </div>
</header>

<main class="flex-1 w-full bg-(--ui-color-surface) pt-16">
  <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <!-- Router outlet for dynamic page views -->
    <router-outlet />
  </div>
</main>

<footer class="w-full border-t border-(--ui-color-border) bg-(--ui-color-surface-muted)">
  <div
    class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4"
  >
    <!-- Brand / Credits -->
    <div class="flex items-center gap-2 text-sm text-(--ui-color-text-muted)">
      <span>© 2026 Promptgist Inc. All rights reserved.</span>
    </div>

    <!-- Footer Nav -->
    <div
      class="flex flex-wrap items-center justify-center gap-6 text-sm text-(--ui-color-text-muted)"
    >
      <a href="#" class="hover:text-(--ui-color-text) transition-colors">Privacy Policy</a>
      <a href="#" class="hover:text-(--ui-color-text) transition-colors">Terms of Service</a>
      <a href="#" class="hover:text-(--ui-color-text) transition-colors">Support</a>
      <a
        href="/design"
        class="font-semibold text-primary hover:text-(--ui-color-text) transition-colors"
        >Design System</a
      >
    </div>
  </div>
</footer>
