<div class="flex min-h-[70vh] flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div
    class="w-full max-w-md space-y-8 bg-(--ui-color-surface-muted)/45 backdrop-blur-md border border-(--ui-color-border) p-8 rounded-2xl shadow-xl"
  >
    <!-- Branding Header -->
    <div class="text-center space-y-2">
      <div
        class="flex h-12 w-12 items-center justify-center rounded-xl bg-linear-to-br from-primary-400 to-primary-600 text-primary-contrast shadow-md shadow-primary-500/20 mx-auto"
      >
        <ng-icon name="faSolidBolt" class="h-6 w-6" />
      </div>
      <h2 class="text-2xl font-extrabold tracking-tight text-(--ui-color-text)">
        {{ isCodeSent() ? 'Confirm Security Code' : 'Sign in to Portal' }}
      </h2>
      <p class="text-sm text-(--ui-color-text-muted)">
        {{
          isCodeSent()
            ? 'We sent a 6-digit authorization code to your inbox.'
            : 'Access your anti-gravity console instantly.'
        }}
      </p>
    </div>

    <!-- Error Alert Message -->
    @if (errorMessage()) {
      <div
        class="rounded-lg bg-red-500/10 border border-red-500/20 p-4 text-sm text-red-500 flex gap-2"
      >
        <ng-icon name="faSolidTriangleExclamation" class="h-5 w-5 shrink-0" />
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- STAGE 1: ENTER EMAIL -->
    @if (!isCodeSent()) {
      <form class="space-y-6" (submit)="onSendCode($event)">
        <div class="space-y-2">
          <label for="email" class="text-sm font-semibold text-(--ui-color-text)"
            >Email Address</label
          >
          <ui-input-text id="email" placeholder="name@company.com" required [(value)]="email" />
        </div>

        <button
          type="submit"
          ui-button
          variant="primary"
          class="w-full h-11"
          [disabled]="isLoading() || !email()"
        >
          {{ isLoading() ? 'Sending Code...' : 'Send Secure OTP' }}
        </button>
      </form>
    }

    <!-- STAGE 2: ENTER VERIFICATION CODE -->
    @else {
      <form class="space-y-6" (submit)="onVerifyCode($event)">
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label for="otp" class="text-sm font-semibold text-(--ui-color-text)"
              >Verification Code</label
            >
            <button
              type="button"
              class="text-xs font-semibold text-primary hover:underline bg-transparent border-0 cursor-pointer"
              (click)="onEditEmail()"
            >
              Change Email
            </button>
          </div>
          <ui-input-text
            id="otp"
            placeholder="6-digit code"
            required
            class="text-center tracking-widest font-mono text-lg"
            [(value)]="otpCode"
          />
        </div>

        <button
          type="submit"
          ui-button
          variant="primary"
          class="w-full h-11"
          [disabled]="isLoading() || !otpCode()"
        >
          {{ isLoading() ? 'Verifying...' : 'Authorize Login' }}
        </button>
      </form>
    }
  </div>
</div>
