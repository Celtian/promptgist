<div [class]="'flex gap-2 ' + uiClass()">
  @for (index of inputIndices(); track index) {
    <input
      #otpInput
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      [id]="inputId() + '-' + index"
      [class]="inputClasses()"
      [disabled]="disabled() || disabledIndices()[index]"
      [placeholder]="placeholder()"
      (input)="onInput($event, index)"
      (keydown)="onKeyDown($event, index)"
      (paste)="onPaste($event)"
      (focus)="onFocus(index)"
      (blur)="onBlur(index)"
    />
  }
</div>
