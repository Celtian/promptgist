<div [class]="rootClasses()">
  <input
    [type]="isVisible() ? 'text' : 'password'"
    [id]="inputId()"
    [class]="inputClasses()"
    [disabled]="disabled()"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <button
    type="button"
    class="absolute right-0 top-0 flex h-10 w-10 items-center justify-center text-[var(--ui-color-text-muted)] transition-colors hover:text-[var(--ui-color-text)] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[color-mix(in_srgb,var(--ui-input-focus,var(--ui-color-primary))_60%,transparent)] disabled:cursor-not-allowed disabled:opacity-55"
    [disabled]="disabled()"
    [attr.aria-label]="isVisible() ? 'Hide password' : 'Show password'"
    (click)="toggleVisibility()"
  >
    @if (isVisible()) {
      <ng-icon name="faSolidEye" class="size-4" />
    } @else {
      <ng-icon name="faSolidEyeSlash" class="size-4" />
    }
  </button>
</div>
