<div #combobox="ngCombobox" ngCombobox readonly [disabled]="disabled()" [class]="rootClasses()">
  <div #origin [class]="triggerClasses()">
    <span class="pointer-events-none min-w-0 flex-1 truncate">
      {{ displayValue() }}
    </span>
    <input
      ngComboboxInput
      class="absolute inset-0 size-full cursor-pointer opacity-0 disabled:cursor-not-allowed"
      [id]="inputId"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-invalid]="hasErrors() || null"
      [attr.aria-controls]="popupId"
      [placeholder]="placeholder()"
      (blur)="touched.set(true)"
    />
    <svg
      aria-hidden="true"
      class="pointer-events-none size-4 shrink-0 text-[var(--ui-color-text-muted)]"
      viewBox="0 0 16 16"
      fill="none"
    >
      <path
        d="M4 6 8 10 12 6"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.8"
      />
    </svg>
  </div>

  <ng-template ngComboboxPopupContainer>
    <ng-template
      [cdkConnectedOverlay]="{ origin, usePopover: 'inline', matchWidth: true }"
      [cdkConnectedOverlayOpen]="combobox.expanded()"
    >
      <div [id]="popupId" [class]="popupClasses()">
        <div
          ngListbox
          focusMode="activedescendant"
          selectionMode="explicit"
          [class]="listboxClasses()"
          [disabled]="disabled()"
          [values]="selectedValues()"
          (valuesChange)="setValue($event)"
        >
          @for (option of options(); track option.value) {
            <div
              ngOption
              [class]="optionClasses()"
              [value]="option.value"
              [label]="option.label"
              [disabled]="option.disabled ?? false"
            >
              <span class="min-w-0 flex-1 truncate">{{ option.label }}</span>
              @if (value() === option.value) {
                <svg aria-hidden="true" class="size-4 shrink-0" viewBox="0 0 16 16" fill="none">
                  <path
                    d="M3.5 8.5 6.5 11.5 12.5 4.5"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                  />
                </svg>
              }
            </div>
          }
        </div>
      </div>
    </ng-template>
  </ng-template>
</div>
