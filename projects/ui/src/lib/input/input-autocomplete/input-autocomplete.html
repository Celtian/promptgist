<div #combobox="ngCombobox" ngCombobox [disabled]="disabled()" [class]="rootClasses()">
  <div #origin [class]="triggerClasses()">
    <input
      ngComboboxInput
      class="absolute inset-0 size-full bg-transparent pl-3 pr-8 outline-none focus:outline-none focus:ring-0 border-none focus:border-transparent disabled:cursor-not-allowed text-[var(--ui-color-text)] placeholder:text-[var(--ui-color-text-muted)]"
      [id]="inputId"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-invalid]="hasErrors() || null"
      [attr.aria-controls]="popupId"
      [placeholder]="placeholder()"
      [(ngModel)]="query"
      (blur)="touched.set(true)"
    />
    <svg
      aria-hidden="true"
      class="pointer-events-none absolute right-3 size-4 shrink-0 text-[var(--ui-color-text-muted)]"
      viewBox="0 0 16 16"
      fill="none"
    >
      <path
        d="M4 6 8 10 12 6"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.8"
      />
    </svg>
  </div>

  <ng-template ngComboboxPopupContainer>
    <ng-template
      [cdkConnectedOverlay]="{ origin, usePopover: 'inline', matchWidth: true }"
      [cdkConnectedOverlayOpen]="combobox.expanded()"
    >
      <div [id]="popupId" [class]="popupClasses()">
        @if (filteredOptions().length === 0) {
          <div class="px-3 py-2 text-sm text-[var(--ui-color-text-muted)]">
            {{ noResultsText() }}
          </div>
        } @else {
          <div
            ngListbox
            focusMode="activedescendant"
            selectionMode="explicit"
            [class]="listboxClasses()"
            [disabled]="disabled()"
            [values]="selectedValues()"
            (valuesChange)="setValue($event)"
          >
            @for (option of filteredOptions(); track option.value) {
              <div
                ngOption
                [class]="optionClasses()"
                [value]="option.value"
                [label]="option.label"
                [disabled]="option.disabled ?? false"
              >
                <span class="min-w-0 flex-1 truncate">{{ option.label }}</span>
                @if (value() === option.value) {
                  <svg
                    aria-hidden="true"
                    class="size-4 shrink-0 text-[var(--ui-color-primary)]"
                    viewBox="0 0 16 16"
                    fill="none"
                  >
                    <path
                      d="M3.5 8.5 6.5 11.5 12.5 4.5"
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                    />
                  </svg>
                }
              </div>
            }
          </div>
        }
      </div>
    </ng-template>
  </ng-template>
</div>
