<button
  ui-button
  type="button"
  variant="outline"
  size="icon"
  role="switch"
  tooltipPlacement="bottom"
  [attr.aria-checked]="currentTheme() === 'dark'"
  [attr.aria-label]="currentTheme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
  [disabled]="isDisabled"
  [uiTooltip]="currentTheme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
  (click)="toggleTheme()"
>
  @if (currentTheme() === 'light') {
    <ng-icon
      name="faSolidMoon"
      class="size-4 shrink-0 transition-transform duration-300 hover:-rotate-12"
    />
  } @else {
    <ng-icon
      name="faSolidSun"
      class="size-4 shrink-0 transition-transform duration-300 hover:rotate-45"
    />
  }
</button>
