<div class="max-w-md w-full text-center space-y-6 py-12 px-4 flex flex-col items-center">
  <!-- Error Category Badge -->
  <p class="text-sm font-extrabold tracking-wider uppercase text-primary">404 Error</p>

  <!-- Main Headline -->
  <h1 class="text-4xl sm:text-5xl font-black text-(--ui-color-text) tracking-tight leading-none">
    Page not found
  </h1>

  <!-- Telemetry Subtitle Description -->
  <p class="text-base text-(--ui-color-text-muted) leading-relaxed">
    Sorry, we couldn't find the page you're looking for. Please check the URL coordinates or select
    one of the system operations below.
  </p>

  <!-- Standard Action Triggers -->
  <div class="flex flex-col sm:flex-row items-center justify-center gap-3 pt-4 w-full">
    <a
      ui-button
      variant="primary"
      href="/"
      class="w-full sm:w-auto px-6 py-2.5 font-semibold shadow-md shadow-primary-500/20"
    >
      Return to Dashboard
    </a>
    <a ui-button variant="secondary" href="/" class="w-full sm:w-auto px-6 py-2.5 font-semibold">
      Browse Homepage
    </a>
  </div>
</div>
